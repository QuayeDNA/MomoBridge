<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoMo Bridge — Verify Payment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0e1a;
      font-family: -apple-system, system-ui, sans-serif;
      padding: 16px;
    }
    .__mb-card {
      width: 100%; max-width: 400px;
      background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 16px;
      overflow: hidden;
    }
    .__mb-card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a4e;
    }
    .__mb-card-header h1 {
      font-size: 16px; font-weight: 700; color: #d4a843; margin: 0;
    }
    .__mb-card-header span {
      font-size: 11px; color: #5a6480;
      background: #0f1424; padding: 2px 8px; border-radius: 4px;
    }
    .__mb-card-body { padding: 20px; }
    .__mb-card-body label {
      display: block; font-size: 13px; color: #8b95b0; margin-bottom: 4px;
    }
    .__mb-card-body input {
      width: 100%; padding: 10px 12px; margin-bottom: 12px;
      background: #0f1424; border: 1px solid #1e2748; border-radius: 10px;
      color: #e8edf5; font-size: 14px; outline: none;
    }
    .__mb-card-body input:focus { border-color: #d4a843; }
    .__mb-card-body input:disabled { opacity: 0.5; }
    .__mb-card-body input.__mb-error-input { border-color: #ef5350; }
    .__mb-amount-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; margin-bottom: 12px;
      background: #0f1424; border: 1px solid #1e2748; border-radius: 10px;
    }
    .__mb-amount-row span:first-child { color: #8b95b0; font-size: 13px; }
    .__mb-amount-row span:last-child { color: #00c853; font-weight: 700; font-size: 15px; }
    .__mb-btn {
      width: 100%; padding: 12px; margin-top: 4px;
      background: #d4a843; color: #0a0e1a; border: none; border-radius: 20px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .__mb-btn:hover { opacity: 0.9; }
    .__mb-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .__mb-btn:active { transform: scale(0.97); }
    .__mb-result { margin-top: 0; min-height: 0; }
    .__mb-hint {
      margin-top: 8px; padding: 8px 12px; border-radius: 8px;
      font-size: 12px; color: #5a6480;
      background: rgba(212, 168, 67, 0.08);
    }
    .__mb-loading {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 0; color: #8b95b0; font-size: 13px;
    }
    .__mb-spinner {
      width: 16px; height: 16px; border: 2px solid #2a2a4e;
      border-top-color: #d4a843; border-radius: 50%;
      animation: __mb_spin 0.6s linear infinite;
    }
    @keyframes __mb_spin { to { transform: rotate(360deg); } }
    @keyframes __mb_fadeIn {
      from { opacity:0; transform:scale(0.95) translateY(8px); }
      to { opacity:1; transform:scale(1) translateY(0); }
    }
    .__mb-error-page {
      text-align: center; color: #ef5350; padding: 40px 20px;
    }

    /* ─── Result Cards ──────────────────────────────────────────────────── */
    .__mb-result-card {
      margin-top: 12px; padding: 16px; border-radius: 12px;
      text-align: center; animation: __mb_fadeIn 0.2s ease-out;
    }
    .__mb-result-success { background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.3); }
    .__mb-result-error { background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3); }
    .__mb-result-warn { background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.3); }
    .__mb-result-icon {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px; font-size: 18px; font-weight: 700;
    }
    .__mb-result-success .__mb-result-icon { background:rgba(0,200,83,0.2);color:#00c853; }
    .__mb-result-error .__mb-result-icon { background:rgba(239,83,80,0.2);color:#ef5350; }
    .__mb-result-warn .__mb-result-icon { background:rgba(240,180,41,0.2);color:#f0b429; }
    .__mb-result-title {
      font-size: 15px; font-weight: 700; margin-bottom: 4px;
    }
    .__mb-result-success .__mb-result-title { color:#00c853; }
    .__mb-result-error .__mb-result-title { color:#ef5350; }
    .__mb-result-warn .__mb-result-title { color:#f0b429; }
    .__mb-result-amount {
      font-size: 20px; font-weight: 700; color: #e8edf5; margin: 6px 0;
    }
    .__mb-result-ref {
      font-size: 11px; color: #5a6480; font-family: monospace;
      background: #0f1424; padding: 4px 8px; border-radius: 4px;
      display: inline-block; margin-top: 4px;
    }
    .__mb-result-message {
      font-size: 13px; color: #8b95b0; margin-top: 4px; line-height: 1.4;
    }
    .__mb-result-retry {
      margin-top: 12px; padding: 8px 20px;
      background: transparent; color: #d4a843; border: 1px solid #d4a843;
      border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .__mb-result-retry:hover { background: rgba(212,168,67,0.1); }
  </style>
</head>
<body>
  <div class="__mb-card">
    <div class="__mb-card-header">
      <h1>MoMo Bridge</h1>
      <span>Payment Verification</span>
    </div>
    <div class="__mb-card-body" id="__mb-body">
      <div id="__mb-content"></div>
    </div>
  </div>

  <script>
    (function () {
      // ─── Read config from URL params ──────────────────────────────────────
      var params = new URLSearchParams(window.location.search);
      var relayUrl = params.get('relayUrl') || '';
      var apiKey = params.get('apiKey') || '';
      var amount = parseFloat(params.get('amount')) || 0;
      var prefilledRef = params.get('reference') || '';
      var callbackUrl = params.get('callbackUrl') || '';
      var currencySymbol = params.get('currencySymbol') || 'GH\u20B5';

      var container = document.getElementById('__mb-content');
      var refInput, btn, resultEl, loadingEl;

      function friendlyMessage(message) {
        var m = (message || '').toLowerCase();
        if (m.indexOf('already') !== -1) return 'This payment was already confirmed.';
        if (m.indexOf('invalid') !== -1) return 'Reference not found in recent transactions.';
        if (m.indexOf('amount') !== -1) return 'The amount doesn\u2019t match what was sent.';
        if (m.indexOf('expired') !== -1) return 'This reference has expired.';
        if (m.indexOf('offline') !== -1) return 'The store phone is currently offline.';
        if (m.indexOf('network') !== -1) return 'Could not reach the verification server.';
        return m || 'Verification failed.';
      }

      function buildResultCard(type, opts) {
        var iconMap = { success: '\u2713', error: '\u2717', warn: '\u26A0' };
        var card = document.createElement('div');
        card.className = '__mb-result-card __mb-result-' + type;

        var icon = document.createElement('div');
        icon.className = '__mb-result-icon';
        icon.textContent = iconMap[type] || '';
        card.appendChild(icon);

        if (opts.title) {
          var title = document.createElement('div');
          title.className = '__mb-result-title';
          title.textContent = opts.title;
          card.appendChild(title);
        }
        if (opts.amount != null) {
          var amt = document.createElement('div');
          amt.className = '__mb-result-amount';
          amt.textContent = (opts.currencySymbol || currencySymbol) + ' ' + opts.amount;
          card.appendChild(amt);
        }
        if (opts.reference) {
          var ref = document.createElement('div');
          ref.className = '__mb-result-ref';
          ref.textContent = 'Ref: ' + opts.reference;
          card.appendChild(ref);
        }
        if (opts.message) {
          var msg = document.createElement('div');
          msg.className = '__mb-result-message';
          msg.textContent = opts.message;
          card.appendChild(msg);
        }
        if (opts.retry) {
          var retryBtn = document.createElement('button');
          retryBtn.className = '__mb-result-retry';
          retryBtn.textContent = 'Try Again';
          retryBtn.addEventListener('click', opts.retry);
          card.appendChild(retryBtn);
        }
        return card;
      }

      // ─── Error state: missing config ──────────────────────────────────────
      if (!relayUrl || !apiKey) {
        container.innerHTML =
          '<div class="__mb-error-page">' +
          '<p style="font-size:24px;margin-bottom:12px">\u26A0</p>' +
          '<p>Missing configuration.</p>' +
          '<p style="font-size:12px;color:#5a6480;margin-top:8px">' +
          'This page requires relayUrl and apiKey query parameters.</p></div>';
        return;
      }

      function showResult(type, opts) {
        clearLoading();
        resultEl.innerHTML = '';
        opts = opts || {};
        opts.currencySymbol = currencySymbol;
        resultEl.appendChild(buildResultCard(type, opts));
      }

      function clearLoading() {
        if (loadingEl && loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
        btn.disabled = false;
        btn.textContent = 'Verify Payment';
      }

      function setLoading() {
        if (!loadingEl) {
          loadingEl = document.createElement('div');
          loadingEl.className = '__mb-loading';
          loadingEl.innerHTML =
            '<div class="__mb-spinner"></div> Verifying with your phone\u2026';
        }
        resultEl.innerHTML = '';
        container.appendChild(loadingEl);
        btn.disabled = true;
        btn.textContent = 'Verifying\u2026';
      }

      function handleVerify() {
        var ref = refInput.value.trim();
        if (!ref) {
          refInput.className = '__mb-error-input';
          showResult('error', {
            title: 'Reference Required',
            message: 'Please enter the transaction reference from your SMS.',
            retry: function () { refInput.focus(); resultEl.innerHTML = ''; },
          });
          refInput.focus();
          return;
        }
        refInput.className = '';
        setLoading();

        var xhr = new XMLHttpRequest();
        xhr.open('POST', relayUrl.replace(/\/+$/, '') + '/claim', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          try {
            var data = JSON.parse(xhr.responseText);
            if (data.confirmed) {
              showResult('success', {
                title: 'Payment Confirmed',
                amount: amount ? amount.toFixed(2) : null,
                reference: ref,
                message: 'Your payment has been verified successfully.',
              });
              try {
                window.parent.postMessage(
                  { type: 'momo_result', confirmed: true, reference: ref, amount: amount },
                  '*'
                );
              } catch (e) {}
              if (callbackUrl) {
                setTimeout(function () {
                  window.location.href =
                    callbackUrl + (callbackUrl.indexOf('?') > -1 ? '&' : '?') +
                    'confirmed=true&reference=' + encodeURIComponent(ref) +
                    '&amount=' + amount;
                }, 1500);
              }
            } else {
              var msg = friendlyMessage(data.message);
              var type = 'error';
              var title = 'Verification Failed';
              if (msg.toLowerCase().indexOf('already') !== -1) {
                type = 'warn';
                title = 'Already Confirmed';
              }
              showResult(type, {
                title: title,
                amount: amount ? amount.toFixed(2) : null,
                reference: ref,
                message: msg,
                retry: function () { resultEl.innerHTML = ''; },
              });
              try {
                window.parent.postMessage(
                  { type: 'momo_result', confirmed: false, reference: ref, amount: amount, error: data.message },
                  '*'
                );
              } catch (e) {}
            }
          } catch (e) {
            clearLoading();
            showResult('error', {
              title: 'Connection Error',
              message: 'Invalid response from relay.',
              retry: function () { resultEl.innerHTML = ''; },
            });
          }
        };
        xhr.onerror = function () {
          clearLoading();
          showResult('error', {
            title: 'Network Error',
            message: 'Could not reach the verification server. Check your connection and try again.',
            retry: function () { resultEl.innerHTML = ''; },
          });
        };
        xhr.send(JSON.stringify({ apiKey: apiKey, reference: ref, amount: amount }));
      }

      // ─── Build UI ─────────────────────────────────────────────────────────
      var label = document.createElement('label');
      label.textContent = 'Transaction Reference';
      container.appendChild(label);

      refInput = document.createElement('input');
      refInput.type = 'text';
      refInput.placeholder = 'e.g. 0000013331054115';
      refInput.value = prefilledRef;
      refInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') handleVerify();
      });
      refInput.addEventListener('input', function () {
        refInput.className = '';
      });
      container.appendChild(refInput);

      var amountRow = document.createElement('div');
      amountRow.className = '__mb-amount-row';
      amountRow.innerHTML =
        '<span>Amount to verify</span>' +
        '<span>' + currencySymbol + ' ' + amount.toFixed(2) + '</span>';
      container.appendChild(amountRow);

      btn = document.createElement('button');
      btn.className = '__mb-btn';
      btn.textContent = 'Verify Payment';
      btn.addEventListener('click', handleVerify);
      container.appendChild(btn);

      resultEl = document.createElement('div');
      resultEl.id = '__mb-result';
      container.appendChild(resultEl);

      var hint = document.createElement('div');
      hint.className = '__mb-hint';
      hint.textContent =
        'Send the exact amount via MoMo to the store number, then enter the reference from the SMS.';
      container.appendChild(hint);
    })();
  </script>
</body>
</html>
